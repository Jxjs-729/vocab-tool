* { margin: 0; padding: 0; box-sizing: border-box; }
body {

}
.header {

  padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 20px; font-weight: 600; }
.stats { display: flex; gap: 20px; font-size: 14px; }
.stats span { color: #666; }
.stats strong { color: #333; }

.tabs {
  display: flex; gap: 0; background: #fff;
  border-bottom: 1px solid #e0e0e0; padding: 0 24px;
}
.tab {
  padding: 12px 20px; border: none; background: none; cursor: pointer;
  font-size: 14px; color: #888; border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab:hover { color: #333; }
.tab.active { color: #333; border-bottom-color: #333; font-weight: 600; }

/* еӯ—жҜҚзӯӣйҖүж Ҹ */
.letter-bar {
  max-width: 640px; margin: 16px auto 0; padding: 0 24px;
  display: flex; gap: 3px; flex-wrap: wrap; justify-content: center;
}
.letter-btn {
  min-width: 30px; height: 30px; border-radius: 4px; border: 1px solid #e0e0e0;
  background: #fff; cursor: pointer; font-size: 12px; color: #666;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.letter-btn:hover { border-color: #333; color: #333; }
.letter-btn.active { background: #333; color: #fff; border-color: #333; font-weight: 600; }
.letter-count { font-size: 11px; color: #aaa; text-align: center; margin-bottom: 8px; }

.main { max-width: 640px; margin: 24px auto; padding: 0 24px; }

/* е®үиЈ…жҸҗзӨәжқЎ */
.install-banner {
  display: none; align-items: center; justify-content: space-between;
  max-width: 640px; margin: 12px auto 0; padding: 10px 16px;
  background: #333; color: #fff; border-radius: 8px; font-size: 14px;
}
.install-banner.show { display: flex; }
.install-banner button {
  padding: 6px 16px; border-radius: 6px; border: 1px solid #fff;
  background: transparent; color: #fff; cursor: pointer; font-size: 13px;
  white-space: nowrap; margin-left: 12px;
}
.install-banner button:hover { background: #555; }
.install-banner .close { background: none; border: none; padding: 4px 8px; margin-left: 6px; cursor: pointer; color: #aaa; font-size: 16px; }

/* иҜҚйў‘жҳҹзә§ */
.freq-stars { font-size: 13px; letter-spacing: 2px; margin-bottom: 6px; }
.freq-stars .filled { color: #f0ad4e; }
.freq-stars .empty { color: #ddd; }
.freq-label { font-size: 11px; color: #999; margin-left: 4px; }

/* й—ӘеҚЎ */
.card {
  perspective: 800px; width: 100%; height: 300px; cursor: pointer;
}
.card-inner {
  position: relative; width: 100%; height: 100%; transition: transform 0.5s;
  transform-style: preserve-3d;
}
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-front, .card-back {
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
  border-radius: 12px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 32px;
}
.card-front { background: #fff; border: 1px solid #e0e0e0; }
.card-back {
  background: #fafafa; border: 1px solid #e0e0e0;
  transform: rotateY(180deg); text-align: center;
}
.card-word { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
.card-phonetic { font-size: 14px; color: #999; margin-bottom: 12px; }
.card-hint { font-size: 13px; color: #bbb; }
.card-meaning { font-size: 22px; color: #333; margin-bottom: 10px; }
.card-example { font-size: 14px; color: #777; font-style: italic; max-width: 400px; line-height: 1.5; }
.card-back .freq-stars { margin-bottom: 12px; }
.card-actions { display: flex; gap: 12px; margin-top: 20px; }

.btn {

  font-size: 14px; transition: all 0.2s;
}
.btn-primary { background: #333; color: #fff; }
.btn-primary:hover { background: #555; }
.btn-outline { background: #fff; color: #333; border: 1px solid #ccc; }
.btn-outline:hover { background: #f5f5f5; }
.btn-danger { background: #fff; color: #e74c3c; border: 1px solid #e74c3c; }
.btn-danger:hover { background: #fef0ef; }
.btn-success { background: #27ae60; color: #fff; }
.btn-success:hover { background: #2ecc71; }

.quiz-header { text-align: center; margin-bottom: 20px; }
.quiz-word { font-size: 32px; font-weight: 700; }
.quiz-phonetic { font-size: 14px; color: #999; margin-top: 4px; }
.options { display: grid; gap: 10px; }
.option {

  border-radius: 8px; cursor: pointer; font-size: 15px; transition: all 0.2s;
}
.option:hover { border-color: #333; }
.option.correct { background: #eafaf1; border-color: #27ae60; }
.option.wrong { background: #fef0ef; border-color: #e74c3c; }
.feedback { text-align: center; margin-top: 16px; font-size: 14px; min-height: 24px; }
.feedback .example { color: #888; font-style: italic; margin-top: 4px; }

.spell-meaning { font-size: 20px; text-align: center; margin-bottom: 8px; color: #666; }
.spell-hint { font-size: 13px; text-align: center; color: #bbb; margin-bottom: 20px; }
.spell-input {

  border-radius: 8px; outline: none; text-align: center;
}
.spell-input:focus { border-color: #333; }
.spell-result { text-align: center; margin-top: 12px; font-size: 14px; min-height: 24px; }

.progress { text-align: center; font-size: 13px; color: #999; margin-bottom: 20px; }

.list-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn {

  background: #fff; cursor: pointer; font-size: 13px; color: #666;

}
.filter-btn.active { background: #333; color: #fff; border-color: #333; }
.word-item {

<script>
// === PWA еҲқе§ӢеҢ– ===
let deferredPrompt = null;
let pwaReady = false;

// з”ҹжҲҗеә”з”Ёеӣҫж Ү (canvas -> data URL)
function generateIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  // иғҢжҷҜ
  ctx.fillStyle = '#333333';
  ctx.beginPath(); ctx.roundRect(0, 0, size, size, size * 0.2); ctx.fill();
  // ж–Үеӯ—
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.45}px -apple-system, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('K', size * 0.5, size * 0.48);
  // дёӢеҲ’зәҝиЈ…йҘ°
  ctx.strokeStyle = '#f0ad4e';
  ctx.lineWidth = size * 0.04;
  ctx.beginPath();
  ctx.moveTo(size * 0.25, size * 0.68);
  ctx.lineTo(size * 0.75, size * 0.68);
  ctx.stroke();
  return c.toDataURL('image/png');
}

// manifest з”ұ <link rel="manifest" href="manifest.json"> еҠ иҪҪ

// жіЁеҶҢ Service WorkerпјҲзҰ»зәҝзј“еӯҳпјү
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('sw.js', { scope: '/' }).catch(() => {});
}

// е®үиЈ…дәӢд»¶
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  pwaReady = true;
  document.getElementById('install-banner').classList.add('show');
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  pwaReady = false;
  document.getElementById('install-banner').classList.remove('show');
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('show');
  });
}

function dismissInstall() {
  document.getElementById('install-banner').classList.remove('show');
}

// еҗҜеҠЁ PWA еҠҹиғҪ
registerSW();
</script>

<script>
// === еә”з”ЁйҖ»иҫ‘ ===
// DEFAULT_WORDS з”ұдёҠж–№еөҢе…ҘејҸж•°жҚ®жҲ–еӨ–йғЁ words_data.js жҸҗдҫӣ

// ===== еӯ—жҜҚзӯӣйҖү =====
let currentLetter = 'all';

function getAvailableLetters() {
  const letters = new Set();
  DEFAULT_WORDS.forEach(w => letters.add(w.word[0].toUpperCase()));
  return [...letters].sort();
}

function getActiveWords() {
  if (currentLetter === 'all') return DEFAULT_WORDS;
  return DEFAULT_WORDS.filter(w => w.word[0].toUpperCase() === currentLetter);
}

function renderLetterBar() {
  const available = getAvailableLetters();
  const active = getActiveWords();
  const bar = document.getElementById('letter-bar');
  let html = `<div class="letter-count">еҪ“еүҚ: ${active.length} дёӘеҚ•иҜҚ</div>`;
  html += `<button class="letter-btn ${currentLetter === 'all' ? 'active' : ''}" onclick="selectLetter('all')">е…ЁйғЁ</button>`;
  available.forEach(l => {
    const cls = currentLetter === l ? 'active' : '';
    html += `<button class="letter-btn ${cls}" onclick="selectLetter('${l}')">${l}</button>`;
  });
  bar.innerHTML = html;
}

function selectLetter(letter) {
  currentLetter = letter;
  flashcardWords = []; flashcardIndex = 0;
  renderLetterBar();
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) renderMap[activeTab.dataset.mode]();
}

function renderStars(freq) {
  let html = '<span class="freq-stars">';
  for (let i = 1; i <= 5; i++) {
    html += i <= freq ? '<span class="filled">вҳ…</span>' : '<span class="empty">вҳҶ</span>';
  }
  const labels = ['', 'дҪҺйў‘', 'еҒҸдҪҺйў‘', 'еёёи§Ғ', 'й«ҳйў‘', 'еҝ…иҖғ'];
  html += `<span class="freq-label">${labels[freq]}</span></span>`;
  return html;
}

// ж•°жҚ®з®ЎзҗҶ
const STORAGE_KEY = 'toefl_vocab_progress';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveProgress(prog) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prog));
}

function getWordStatus(word) {
  return loadProgress()[word] || 'new';
}

function setWordStatus(word, status) {
  const prog = loadProgress();
  prog[word] = status;
  saveProgress(prog);
  updateStats();
}

function updateStats() {
  const prog = loadProgress();
  let mastered = 0, learning = 0, newCount = 0;
  DEFAULT_WORDS.forEach(w => {
    const s = prog[w.word] || 'new';
    if (s === 'mastered') mastered++;
    else if (s === 'learning') learning++;
    else newCount++;
  });
  document.getElementById('stat-mastered').textContent = mastered;
  document.getElementById('stat-learning').textContent = learning;
  document.getElementById('stat-new').textContent = newCount;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ========== й—ӘеҚЎжЁЎејҸ ==========
let flashcardIndex = 0;
let flashcardWords = [];

function renderFlashcard() {
  if (flashcardWords.length === 0) {
    flashcardWords = shuffle(getActiveWords());
    flashcardIndex = 0;
  }
  if (flashcardWords.length === 0) {
    document.getElementById('main').innerHTML = '<div class="empty-state">иҜҘеӯ—жҜҚдёӢжҡӮж— еҚ•иҜҚ</div>';
    return;
  }
  const w = flashcardWords[flashcardIndex];
  document.getElementById('main').innerHTML = `
    <div class="progress">${flashcardIndex + 1} / ${flashcardWords.length}</div>
    <div class="card" id="flashcard" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-front">
          ${renderStars(w.freq)}
          <div class="card-word">${w.word}</div>
          <div class="card-phonetic">${w.phonetic}</div>
          <div class="card-hint">зӮ№еҮ»зҝ»иҪ¬жҹҘзңӢйҮҠд№үдёҺдҫӢеҸҘ</div>
        </div>
        <div class="card-back">
          ${renderStars(w.freq)}
          <div class="card-meaning">${w.meaning}</div>
          <div class="card-example">${w.example ? '"' + w.example + '"' : ''}</div>
        </div>
      </div>
    </div>
    <div class="card-actions" style="justify-content:center;margin-top:20px;">
      <button class="btn btn-danger" onclick="event.stopPropagation();flashcardResult('learning')">жІЎи®°дҪҸ</button>
      <button class="btn btn-success" onclick="event.stopPropagation();flashcardResult('mastered')">и®°дҪҸдәҶ</button>
    </div>
  `;
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

function flashcardResult(status) {
  setWordStatus(flashcardWords[flashcardIndex].word, status);
  flashcardIndex = (flashcardIndex + 1) % flashcardWords.length;
  if (flashcardIndex === 0) flashcardWords = shuffle(getActiveWords());
  renderFlashcard();
}

// ========== йҖүжӢ©йўҳжЁЎејҸ ==========
let quizWord = null;
let quizAnswered = false;

function renderQuiz() {
  quizAnswered = false;
  const words = shuffle(getActiveWords());
  quizWord = words[0];
  if (!quizWord) {
    document.getElementById('main').innerHTML = '<div class="empty-state">иҜҘеӯ—жҜҚдёӢжҡӮж— еҚ•иҜҚ</div>';
    return;
  }
  const distractors = shuffle(words.slice(1).filter(w => w.word !== quizWord.word)).slice(0, 3);
  const options = shuffle([quizWord, ...distractors]);

  document.getElementById('main').innerHTML = `
    <div class="quiz-header">
      ${renderStars(quizWord.freq)}
      <div class="quiz-word">${quizWord.word}</div>
      <div class="quiz-phonetic">${quizWord.phonetic}</div>
    </div>
    <div class="options">
      ${options.map((o, i) => `
        <div class="option" data-index="${i}" onclick="selectOption(${i}, '${o.word.replace(/'/g, "\\'")}')">
          ${o.meaning}
        </div>
      `).join('')}
    </div>
    <div class="feedback" id="quiz-feedback"></div>
  `;
}

function selectOption(index, word) {
  if (quizAnswered) return;
  quizAnswered = true;
  const options = document.querySelectorAll('.option');
  const feedback = document.getElementById('quiz-feedback');

  if (word === quizWord.word) {
    options[index].classList.add('correct');
    feedback.innerHTML = '<span style="color:#27ae60;">жӯЈзЎ®</span>' +
      (quizWord.example ? `<div class="example">"${quizWord.example}"</div>` : '');
    setWordStatus(quizWord.word, 'mastered');
  } else {
    options[index].classList.add('wrong');
    options.forEach(opt => {
      if (opt.textContent.trim() === quizWord.meaning) opt.classList.add('correct');
    });
    feedback.innerHTML = `<span style="color:#e74c3c;">жӯЈзЎ®зӯ”жЎҲжҳҜгҖҢ${quizWord.meaning}гҖҚ</span>` +
      (quizWord.example ? `<div class="example">"${quizWord.example}"</div>` : '');
    setWordStatus(quizWord.word, 'learning');
  }

  setTimeout(renderQuiz, 2000);
}

// ========== жӢјеҶҷжЁЎејҸ ==========
let spellWord = null;
let spellSubmitted = false;

function renderSpell() {
  spellSubmitted = false;
  const words = getActiveWords();
  spellWord = words[Math.floor(Math.random() * words.length)];
  if (!spellWord) {
    document.getElementById('main').innerHTML = '<div class="empty-state">иҜҘеӯ—жҜҚдёӢжҡӮж— еҚ•иҜҚ</div>';
    return;
  }

  document.getElementById('main').innerHTML = `
    <div style="text-align:center;margin-bottom:8px;">${renderStars(spellWord.freq)}</div>
    <div class="spell-meaning">${spellWord.meaning}</div>
    <div class="spell-hint">иҜ·иҫ“е…ҘеҜ№еә”зҡ„иӢұж–ҮеҚ•иҜҚ</div>
    <input type="text" class="spell-input" id="spell-input" placeholder="иҫ“е…ҘиӢұж–ҮеҚ•иҜҚвҖҰ" autofocus autocomplete="off" autocapitalize="off">
    <div class="spell-result" id="spell-result"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-primary" onclick="checkSpell()">зЎ®и®Ө</button>
      <button class="btn btn-outline" onclick="skipSpell()">и·іиҝҮ</button>
    </div>
  `;

  document.getElementById('spell-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkSpell();
  });
}

function checkSpell() {
  if (spellSubmitted) return;
  spellSubmitted = true;
  const input = document.getElementById('spell-input').value.trim().toLowerCase();
  const correct = spellWord.word.toLowerCase();
  const result = document.getElementById('spell-result');

  if (input === correct) {
    result.innerHTML = '<span style="color:#27ae60;">жӯЈзЎ®</span>' +
      (spellWord.example ? `<div style="color:#888;font-style:italic;margin-top:4px;">"${spellWord.example}"</div>` : '');
    setWordStatus(spellWord.word, 'mastered');
  } else {
    result.innerHTML = `<span style="color:#e74c3c;">жӯЈзЎ®зӯ”жЎҲжҳҜ <strong>${spellWord.word}</strong></span>` +
      (spellWord.example ? `<div style="color:#888;font-style:italic;margin-top:4px;">"${spellWord.example}"</div>` : '');
    setWordStatus(spellWord.word, 'learning');
  }

  setTimeout(renderSpell, 2000);
}

function skipSpell() {
  const result = document.getElementById('spell-result');
  result.innerHTML = `<span style="color:#888;">зӯ”жЎҲжҳҜ <strong>${spellWord.word}</strong></span>` +
    (spellWord.example ? `<div style="color:#888;font-style:italic;margin-top:4px;">"${spellWord.example}"</div>` : '');
  spellSubmitted = true;
  setTimeout(renderSpell, 2000);
}

// ========== еҚ•иҜҚеҲ—иЎЁ ==========
let listFilter = 'all';

function renderList() {
  document.getElementById('main').innerHTML = `
    <div class="list-filters">
      <button class="filter-btn ${listFilter === 'all' ? 'active' : ''}" onclick="setListFilter('all')">е…ЁйғЁ</button>
      <button class="filter-btn ${listFilter === '5' ? 'active' : ''}" onclick="setListFilter('5')">еҝ…иҖғ</button>
      <button class="filter-btn ${listFilter === '4' ? 'active' : ''}" onclick="setListFilter('4')">й«ҳйў‘</button>
      <button class="filter-btn ${listFilter === '3' ? 'active' : ''}" onclick="setListFilter('3')">еёёи§Ғ</button>
      <button class="filter-btn ${listFilter === 'new' ? 'active' : ''}" onclick="setListFilter('new')">жңӘеӯҰд№ </button>
      <button class="filter-btn ${listFilter === 'learning' ? 'active' : ''}" onclick="setListFilter('learning')">еӯҰд№ дёӯ</button>
    </div>
    <div class="word-list" id="word-list"></div>
  `;
  renderFilteredList();
}

function setListFilter(f) { listFilter = f; renderList(); }

function renderFilteredList() {
  const container = document.getElementById('word-list');
  if (!container) return;
  const statusLabels = { new: 'жңӘеӯҰд№ ', learning: 'еӯҰд№ дёӯ', mastered: 'е·ІжҺҢжҸЎ' };
  const statusClasses = { new: 'status-new', learning: 'status-learning', mastered: 'status-mastered' };

  let filtered = getActiveWords();
  if (listFilter === 'new' || listFilter === 'learning' || listFilter === 'mastered') {
    filtered = filtered.filter(w => getWordStatus(w.word) === listFilter);
  } else if (['5','4','3','2','1'].includes(listFilter)) {
    filtered = filtered.filter(w => w.freq === parseInt(listFilter));
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">жҡӮж— еҢ№й…ҚеҚ•иҜҚ</div>';
    return;
  }

  container.innerHTML = filtered.map(w => {
    const s = getWordStatus(w.word);
    return `
      <div class="word-item">
        <div class="left">
          <div class="word-row">
            <strong>${w.word}</strong>
            <span style="color:#999;font-size:13px;">${w.phonetic}</span>
            ${renderStars(w.freq)}
          </div>
          <div class="meaning">${w.meaning}</div>
          ${w.example ? `<div class="example">"${w.example}"</div>` : ''}
        </div>
        <span class="status ${statusClasses[s]}">${statusLabels[s]}</span>
      </div>
    `;
  }).join('');
}

// ========== и·Ҝз”ұ ==========
const renderMap = { flashcard: renderFlashcard, quiz: renderQuiz, spell: renderSpell, list: renderList };

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const mode = tab.dataset.mode;
    if (mode === 'flashcard') { flashcardWords = []; flashcardIndex = 0; }
    renderMap[mode]();
  });
});

// еҗҜеҠЁ
updateStats();
renderLetterBar();
renderFlashcard();
</script>
